name: Discord Events Sync

on:
  schedule:
    # Baseline: every hour, on the hour. Catches edits, late posts, and
    # whatever was missed during quiet hours.
    - cron: '0 * * * *'
    # Session burst: every 10 minutes during the weekly Sunday play session
    # so freshly-posted events land on the live map within minutes instead
    # of up to an hour later.
    #
    # Schedule (UTC):  Sunday 18:00 → 22:59  (5 hours)
    # Local (BST):     Sunday 19:00 → 23:59  (matches 4-hour 19:00 session
    #                                          + 1-hour buffer after end)
    #
    # If the session moves or your local timezone shifts (e.g. BST → GMT
    # in late October), edit the hour range below. Cron is always UTC.
    - cron: '*/10 18-22 * * 0'
  workflow_dispatch:
    inputs:
      since:
        description: 'One-shot backfill from this date (YYYY-MM-DD or ISO). Leave blank for normal cron resume.'
        required: false
        default: ''
      chunk_days:
        description: 'Optional: when set together with since, run the backfill in N-day chunks with a sleep between, to ease Discord rate-limit pressure on large windows. Each chunk commits incrementally. Try 3 or 5 first.'
        required: false
        default: ''
      chunk_pause_seconds:
        description: 'Seconds to sleep between chunks (default 10). Only used when chunk_days is set.'
        required: false
        default: '10'
      debug_fetch:
        description: 'Diagnostic: fetch a specific message and dump its raw content + regex match info. Paste a full Discord URL (.../channels/.../.../...) or channel_id:message_id. Leave blank for normal runs.'
        required: false
        default: ''

# Serialise runs so the every-10-min burst can't double-fire (e.g. one run
# overruns its slot, the next slot fires while the first is still going).
# Newer runs wait for the older to finish; if multiple pile up, only the
# latest stays queued — fine here because each run is idempotent.
concurrency:
  group: discord-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Discord sync (single pass)
        if: inputs.chunk_days == ''
        id: sync
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          SYNC_SINCE: ${{ inputs.since }}
          DEBUG_FETCH: ${{ inputs.debug_fetch }}
        # Per-campaign channel id + paths come from campaigns.json (--campaign).
        # To add another synced campaign, add a discord_sync block there and
        # either parameterize this workflow or fan out via matrix strategy.
        run: python tools/sync_events.py --campaign darthsunday

      - name: Commit and push (single pass)
        if: inputs.chunk_days == '' && steps.sync.outputs.had_changes == 'true'
        run: |
          git add darthsunday/data/events.json darthsunday/data/processed_ids.json
          git commit -m "chore: sync Discord events $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          git push

      # Chunked-backfill mode: walk from `since` to today in `chunk_days`
      # increments, calling the sync once per chunk with --since/--until and
      # committing+pushing between chunks. This keeps each chunk's Discord API
      # usage small enough to avoid global rate-limit churn on large backfills,
      # and lands progress incrementally so a later failure doesn't lose work.
      - name: Run Discord sync (chunked backfill)
        if: inputs.chunk_days != ''
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          SINCE: ${{ inputs.since }}
          CHUNK_DAYS: ${{ inputs.chunk_days }}
          CHUNK_PAUSE: ${{ inputs.chunk_pause_seconds }}
        run: |
          set -euo pipefail
          if [ -z "$SINCE" ]; then
            echo "ERROR: chunk_days set but since is empty — chunked mode needs a starting date."
            exit 1
          fi
          if ! [[ "$CHUNK_DAYS" =~ ^[0-9]+$ ]] || [ "$CHUNK_DAYS" -lt 1 ]; then
            echo "ERROR: chunk_days must be a positive integer, got $CHUNK_DAYS"
            exit 1
          fi

          TODAY=$(date -u +%Y-%m-%d)
          current="$SINCE"
          chunk_num=0
          while [ "$current" \< "$TODAY" ]; do
            chunk_num=$((chunk_num + 1))
            next=$(date -u -d "$current + $CHUNK_DAYS days" +%Y-%m-%d)
            if [ "$next" \> "$TODAY" ] || [ "$next" = "$TODAY" ]; then
              next="$TODAY"
            fi
            echo ""
            echo "════════════════════════════════════════════════════════"
            echo "  Chunk #$chunk_num: $current → $next"
            echo "════════════════════════════════════════════════════════"

            python tools/sync_events.py --campaign darthsunday \
              --since "$current" --until "$next"

            # Commit + push between chunks so progress survives a later failure.
            git add darthsunday/data/events.json darthsunday/data/processed_ids.json
            if ! git diff --cached --quiet; then
              git commit -m "chore: sync Discord events (chunk $current..$next)"
              git push
              echo "  committed + pushed chunk $chunk_num"
            else
              echo "  no changes in chunk $chunk_num"
            fi

            current="$next"
            if [ "$current" != "$TODAY" ]; then
              echo "  sleeping ${CHUNK_PAUSE}s to ease rate-limit pressure ..."
              sleep "$CHUNK_PAUSE"
            fi
          done
          echo ""
          echo "Chunked backfill complete: $chunk_num chunk(s) processed."