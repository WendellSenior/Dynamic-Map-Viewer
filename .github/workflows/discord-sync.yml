name: Discord Events Sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      since:
        description: 'One-shot backfill from this date (YYYY-MM-DD or ISO). Leave blank for normal cron resume.'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Discord sync
        id: sync
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          SYNC_SINCE: ${{ inputs.since }}
        run: python darthsunday/scripts/sync_events.py

      - name: Commit and push changes
        if: steps.sync.outputs.had_changes == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add darthsunday/data/events.json
          git add darthsunday/data/processed_ids.json
          git commit -m "chore: sync Discord events $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          git push