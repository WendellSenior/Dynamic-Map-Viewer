<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dynamic Map Viewer</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header>
    <h1>Dynamic Map Viewer</h1>
    <div class="header-right">
      <label class="filter-toggle">
        Show:
        <select id="filter">
          <option value="all">All events</option>
          <option value="past">Past only</option>
        </select>
      </label>
      <div id="current-date" aria-live="polite"></div>
    </div>
  </header>

  <main>
    <div id="map-container">
      <div id="map-frame">
        <img id="map-image" alt="Campaign map">
        <div id="event-dots"></div>
      </div>
    </div>
    <aside id="event-panel">
      <p class="empty">Click a dot to see the event.</p>
    </aside>
  </main>

  <footer>
    <div class="timeline-track">
      <div id="timeline-marks"></div>
      <input type="range" id="timeline" min="0" max="1000" value="0" step="1" aria-label="Timeline">
    </div>
    <div id="timeline-labels"></div>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
